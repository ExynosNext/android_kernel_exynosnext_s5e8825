# ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
# What this pipeline actually builds
#
#   It syncs Google's ACK android17-6.18 GKI tree into common/, overlays this
#   repo's device-tree / include / vendor-module / KMI files on top, then
#   builds four variants:
#     1. vanilla       Гўв‚¬вЂќ GKI Image + DTBs + clock module, no root.
#     2. ksu           Гўв‚¬вЂќ as above + KernelSU-Next root.
#     3. vanilla-oneui Гўв‚¬вЂќ vanilla + oneui.config fragment (Samsung OneUI hooks).
#     4. ksu-oneui     Гўв‚¬вЂќ ksu + oneui.config fragment (Samsung OneUI + root).
#
#   The *-oneui variants apply oneui.config on top of vendor_exynosnext.config,
#   enabling Samsung vendor hooks, SELinux develop mode, binderfs, and the
#   other hooks OneUI user-space expects from the kernel.
#
#   The remaining 13 Samsung vendor modules (display, gpu, audio, modem,
#   wifi, input, sensors, battery, fingerprint) are scaffolding with no ported
#   source yet Гўв‚¬вЂќ see docs/STATUS.md and docs/PORTING.md. They are not built.
# ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ksu
          - vanilla

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 50G
  GKI_BRANCH: common-android17-6.18

jobs:
  build:
    name: GKI 6.18 baseline (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        variant: [vanilla, ksu, vanilla-oneui, ksu-oneui]

    steps:
      - name: Checkout ExynosNext overlay
        uses: actions/checkout@v7
        with:
          path: exynosnext
          fetch-depth: 1

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo docker image prune --all --force || true
          df -h .

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential ccache curl flex git \
            libncurses5-dev libssl-dev python3 python3-pip \
            lz4 zip unzip tar xz-utils cpio \
            clang lld llvm llvm-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync GKI source (${{ env.GKI_BRANCH }})
        run: |
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b "$GKI_BRANCH" --depth=1
          repo sync -j"$(nproc --all)" --no-tags
          echo "=== Sanity ==="
          ls common/Makefile common/arch/arm64/configs/gki_defconfig
          grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL)' common/Makefile | head -3

      - name: Apply ExynosNext overlay
        run: |
          # Overlay the ExynosNext device-tree, include, vendor-module and
          # KMI files on top of the synced ACK tree so the device DTBs and
          # the clock driver become part of the build.
          OVERLAY="$GITHUB_WORKSPACE/exynosnext"
          mkdir -p common/arch/arm64/boot/dts/samsung
          cp -rv "$OVERLAY/arch/."        common/arch/
          cp -rv "$OVERLAY/include/."     common/include/
          cp -rv "$OVERLAY/vendor/."      common/vendor/
          cp -rv "$OVERLAY/gki/."         common/gki/
          # Wire the vendor Kconfig into the kernel Kconfig menu.
          if ! grep -q 'vendor/samsung/Kconfig' common/Kconfig; then
            printf '\nsource "vendor/samsung/Kconfig"\n' >> common/Kconfig
          fi
          # Wire the vendor Makefile into the kernel build tree.
          if ! grep -q 'vendor/samsung/Makefile' common/Makefile; then
            printf '\nobj-y += vendor/samsung/\n' >> common/Makefile
          fi
          # Register the samsung DTS subdirectory so 'make dtbs' builds it.
          # ACK has no Exynos support, so arch/arm64/boot/dts/Makefile does
          # not list 'samsung' in subdir-y Гўв‚¬вЂќ add it explicitly.
          DTS_MK="common/arch/arm64/boot/dts/Makefile"
          if ! grep -q 'subdir-y += samsung' "$DTS_MK"; then
            printf '\nsubdir-y += samsung\n' >> "$DTS_MK"
          fi
          echo "=== Overlay applied ==="
          ls common/arch/arm64/boot/dts/samsung/exynos1280*.dts | head
          echo "=== DTS subdir registration ==="
          grep -n 'samsung' "$DTS_MK" || echo "WARNING: samsung not registered"

      - name: Integrate KernelSU-Next
        if: contains(matrix.variant, 'ksu')
        working-directory: common
        run: |
          # Manual KSU-Next integration. We avoid the upstream setup.sh
          # because it calls `git checkout next` which fails on a fresh
          # clone (the default branch is `dev`, and `origin/next` isn't
          # fetched by a plain `git clone`).
          set -x
          git clone --depth=1 --branch dev \
            https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next
          KSU_TAG="$(cd KernelSU-Next && git describe --tags --always 2>/dev/null || echo unknown)"
          echo "KSU_VERSION=${KSU_TAG}" >> "$GITHUB_ENV"

          # KSU-Next stores UAPI headers in a top-level `uapi/` directory,
          # and `kernel/include/uapi` is a relative symlink to `../../uapi`.
          # Replace the symlink with a real directory copy.
          if [ -L KernelSU-Next/kernel/include/uapi ]; then
            rm KernelSU-Next/kernel/include/uapi
            cp -r KernelSU-Next/uapi KernelSU-Next/kernel/include/uapi
          fi

          # Copy the KSU kernel sources into the tree as a REAL directory
          # (not a symlink). A symlink breaks relative #include "..." path
          # resolution in the kbuild O=out build context, causing
          # 'klog.h' and 'uapi/app_profile.h' not found. A real copy keeps
          # the include paths relative to the actual file location.
          rm -rf drivers/kernelsu
          cp -r KernelSU-Next/kernel drivers/kernelsu

          # The KSU source uses #include "uapi/app_profile.h" which resolves
          # relative to the module root (drivers/kernelsu/uapi/). Copy the
          # top-level uapi/ directory there so the include resolves.
          cp -r KernelSU-Next/uapi drivers/kernelsu/uapi

          # Similarly, #include "klog.h" (used by core/init.c and
          # feature/kernel_umount.c) resolves relative to the module root.
          # Copy the include/ headers to the module root so klog.h is found.
          cp -r KernelSU-Next/kernel/include/* drivers/kernelsu/

          # Patch sepolicy.c: the dup_sepolicy function references
          # policydb.android_netlink_route / android_netlink_getneigh and
          # POLICYDB_CONFIG_ANDROID_NETLINK_* which are Samsung-private
          # SELinux extensions not present in ACK 6.18. Wrap the config-fixup
          # block in #if 0 so the code compiles against mainline SELinux.
          python3 "$GITHUB_WORKSPACE/exynosnext/scripts/patches/ksu-sepolicy-ack618.py" \
            drivers/kernelsu/selinux/sepolicy.c

          # Wire KSU into the kernel build.
          grep -q 'kernelsu' drivers/Makefile || \
            printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile
          grep -q 'drivers/kernelsu/Kconfig' drivers/Kconfig || \
            sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

          echo "=== KernelSU-Next integrated: ${KSU_TAG} ==="
          ls -la drivers/kernelsu/Kbuild
          ls -la drivers/kernelsu/include/uapi/app_profile.h
          ls -la drivers/kernelsu/include/klog.h

      - name: Restore ccache
        uses: actions/cache@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ matrix.variant }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.variant }}-
            ccache-${{ runner.os }}-

      - name: Configure kernel
        working-directory: common
        run: |
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 -j"$(nproc --all)" gki_defconfig

          # Apply this repo's fragment on top of gki_defconfig.
          scripts/kconfig/merge_config.sh -m -O out \
            out/.config \
            "$GITHUB_WORKSPACE/exynosnext/vendor_exynosnext.config"

          # Enable KernelSU-Next when integrated.
          if echo "${{ matrix.variant }}" | grep -q ksu; then
            ./scripts/config --file out/.config -e KSU
          fi

          # Apply the OneUI fragment for *-oneui variants (after the base
          # vendor fragment). It adds Samsung vendor hooks, SELinux develop
          # mode, binderfs, and the hooks OneUI user-space expects.
          if echo "${{ matrix.variant }}" | grep -q oneui; then
            scripts/kconfig/merge_config.sh -m -O out \
              out/.config \
              "$GITHUB_WORKSPACE/exynosnext/oneui.config"
          fi

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig
          echo "=== Config summary ==="
          echo "  =y : $(grep -c '=y' out/.config)"
          echo "  =m : $(grep -c '=m' out/.config)"
          echo "  KSU: $(grep -E '^CONFIG_KSU=' out/.config || echo 'not set')"

      - name: Build Image
        working-directory: common
        run: |
          make O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump STRIP=llvm-strip \
            -j"$(nproc --all)" \
            Image Image.gz
          ls -lh out/arch/arm64/boot/Image*

      - name: Build device DTBs
        working-directory: common
        run: |
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 -j"$(nproc --all)" \
            dtbs
          echo "=== Built Samsung DTBs ==="
          find out/arch/arm64/boot/dts -name 'exynos1280-*.dtb' -exec ls -lh {} \; || \
            echo "WARNING: no exynos1280 DTBs found"
          # Also build dtbo.img from the overlay DTBOs if mkdtboimg is present.
          DTBOS=$(find out/arch/arm64/boot/dts -name '*.dtbo' 2>/dev/null)
          if [ -n "$DTBOS" ] && command -v mkdtboimg >/dev/null 2>&1; then
            mkdtboimg create out/arch/arm64/boot/dtbo.img $DTBOS
            echo "=== dtbo.img built ==="
            ls -lh out/arch/arm64/boot/dtbo.img
          fi

      - name: Build clock module (non-fatal)
        working-directory: common
        continue-on-error: true
        run: |
          # The clock module is disabled in the config for now (see
          # vendor_exynosnext.config for why). This step is kept for when
          # the ACPM port lands and the module can be re-enabled.
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 -j"$(nproc --all)" \
            M=vendor/samsung/clock modules 2>&1 || true
          ls -lh vendor/samsung/clock/*.ko 2>/dev/null || echo "clock module: not built (expected вЂ” see config comment)"

      - name: Build boot.img
        working-directory: common
        run: |
          # Create a flashable Android boot image containing the kernel.
          # GKI boot.img needs a ramdisk; we use a minimal initramfs stub so
          # the image is structurally valid (fastboot flash boot).  The real
          # ramdisk comes from the device's vendor_boot at flash time.
          mkdir -p out/ramdisk
          echo "ExynosNext GKI stub ramdisk" > out/ramdisk/init
          chmod 755 out/ramdisk/init
          (cd out/ramdisk && find . | cpio -o -H newc 2>/dev/null | gzip > ../ramdisk.cpio.gz)

          # Use the in-tree mkbootimg (ACK ships it under tools/mkbootimg or
          # common/system/tools/mkbootimg).  Fall back to the system one.
          MKBOOTIMG=""
          for p in tools/mkbootimg/mkbootimg.py system/tools/mkbootimg/mkbootimg.py; do
            if [ -f "$p" ]; then MKBOOTIMG="python3 $p"; break; fi
          done
          if [ -z "$MKBOOTIMG" ]; then
            MKBOOTIMG=$(command -v mkbootimg 2>/dev/null)
          fi

          if [ -n "$MKBOOTIMG" ]; then
            $MKBOOTIMG \
              --kernel out/arch/arm64/boot/Image \
              --ramdisk out/ramdisk.cpio.gz \
              --cmdline "androidboot.hardware=exynos1280 loop.max_part=7" \
              --pagesize 4096 \
              --base 0x10000000 \
              --kernel_offset 0x00008000 \
              --ramdisk_offset 0x01000000 \
              --output out/arch/arm64/boot/boot.img
            echo "=== boot.img built ==="
            ls -lh out/arch/arm64/boot/boot.img
          else
            echo "WARNING: mkbootimg not found; shipping raw Image only"
          fi

      - name: Package flashable bundle
        run: |
          # Package everything into out/dist/ (a flat directory), which
          # upload-artifact will deliver as a single downloadable archive
          # (no zip-in-zip).
          mkdir -p out/dist/dtb out/dist/modules
          DIST=out/dist

          # Kernel images
          cp -v common/out/arch/arm64/boot/Image      $DIST/ 2>/dev/null || true
          cp -v common/out/arch/arm64/boot/Image.gz   $DIST/ 2>/dev/null || true
          cp -v common/out/arch/arm64/boot/boot.img   $DIST/ 2>/dev/null || true
          cp -v common/out/arch/arm64/boot/dtbo.img   $DIST/ 2>/dev/null || true

          # Device DTBs
          find common/out/arch/arm64/boot/dts -name 'exynos1280-*.dtb' \
            -exec cp -v {} $DIST/dtb/ \; 2>/dev/null || true

          # Clock module (.ko)
          find common/vendor/samsung/clock -name '*.ko' \
            -exec cp -v {} $DIST/modules/ \; 2>/dev/null || true
          # Also check the build output tree
          find common/out -name 'clk*s5e8825*.ko' \
            -exec cp -v {} $DIST/modules/ \; 2>/dev/null || true

          # Kernel config + build info
          cp -v common/out/.config $DIST/kernel.config 2>/dev/null || true
          cat > $DIST/README.txt <<'EOF'
          ExynosNext GKI kernel build
          ===========================
          Files:
            Image        Гўв‚¬вЂќ raw kernel image (fastboot boot / fastboot flash boot)
            Image.gz     Гўв‚¬вЂќ gzip-compressed kernel
            boot.img     Гўв‚¬вЂќ Android boot image (fastboot flash boot)
            dtbo.img     Гўв‚¬вЂќ device tree overlay image (fastboot flash dtbo)
            dtb/*.dtb    Гўв‚¬вЂќ individual device tree blobs
            modules/*.ko Гўв‚¬вЂќ loadable kernel modules (install to /vendor/lib/modules)
            kernel.config Гўв‚¬вЂќ the .config used for this build

          Flashing (fastboot):
            fastboot flash boot boot.img
            fastboot flash dtbo dtbo.img   # if present
            fastboot reboot

          NOTE: This is an early bring-up kernel. It builds but does NOT yet
          boot on the device Гўв‚¬вЂќ Samsung vendor modules (clock/PMIC/display) are
          not fully ported. See docs/STATUS.md.
          EOF

          echo "=== Final dist contents ==="
          find $DIST -type f -exec ls -lh {} \;

      - name: Upload kernel config
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: config-${{ matrix.variant }}
          path: common/out/.config
          retention-days: 7

      - name: Upload flashable bundle
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ExynosNext-GKI-${{ matrix.variant }}
          path: out/dist/
          retention-days: 14

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Zip the dist for the GitHub release (not for artifacts).
          VERSION=$(date +%Y%m%d-%H%M)
          case "${{ matrix.variant }}" in
            ksu-oneui)     SUFFIX="KSU-OneUI" ;;
            vanilla-oneui) SUFFIX="Vanilla-OneUI" ;;
            ksu)           SUFFIX="KSU" ;;
            vanilla)       SUFFIX="Vanilla" ;;
          esac
          ZIP="ExynosNext-GKI-${SUFFIX}-${VERSION}.zip"
          (cd out/dist && zip -r9 "../../${ZIP}" . -x '*.git*')
          echo "Created ${ZIP}"

          # Create/update the GitHub release with this variant's zip.
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" "$ZIP" \
            --title "$TAG" \
            --notes "ExynosNext GKI build $TAG ($SUFFIX variant)" \
            --prerelease 2>/dev/null || \
          gh release upload "$TAG" "$ZIP" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
