name: ExynosNext Kernel CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ksu
          - vanilla
      clean_build:
        description: 'Clean build'
        required: false
        default: false
        type: boolean

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 50G

jobs:
  build:
    name: Build ExynosNext (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        variant: [ksu, vanilla]
        include:
          - variant: ksu
            zip_suffix: 'KSU'
          - variant: vanilla
            zip_suffix: 'Vanilla'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo docker image prune --all --force || true

      - name: Setup environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential ccache curl flex git \
            libncurses5-dev libssl-dev python3 python3-pip \
            lz4 zip unzip tar xz-utils cpio \
            clang lld llvm llvm-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Setup repo
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init and sync kernel source
        run: |
          mv MODULE.bazel MODULE.bazel.bak 2>/dev/null || true
          mv BUILD.bazel BUILD.bazel.bak 2>/dev/null || true
          mv .bazelrc .bazelrc.bak 2>/dev/null || true
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-android17-6.18 --depth=1
          repo sync -j$(nproc --all) --no-tags
          mv MODULE.bazel.bak MODULE.bazel 2>/dev/null || true
          mv BUILD.bazel.bak BUILD.bazel 2>/dev/null || true
          mv .bazelrc.bak .bazelrc 2>/dev/null || true

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ matrix.variant }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.variant }}-
            ccache-${{ runner.os }}-

      - name: Verify toolchain
        run: |
          echo "=== Compiler ==="
          clang --version
          echo "=== Linker ==="
          ld.lld --version
          echo "=== Cross compiler ==="
          aarch64-linux-gnu-gcc --version | head -1
          echo "=== Kernel source ==="
          ls common/Makefile common/arch/arm64/configs/gki_defconfig 2>/dev/null || echo "ERROR: kernel source not found"
          echo "=== merge_config.sh ==="
          ls common/scripts/kconfig/merge_config.sh 2>/dev/null || echo "ERROR: merge_config.sh not found"
          echo "=== Disk space ==="
          df -h .

      - name: Generate defconfig
        working-directory: common
        run: |
          mkdir -p out
          make O=out \
            ARCH=arm64 SUBARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            -j$(nproc --all) \
            gki_defconfig 2>&1
          echo "=== defconfig complete ==="

      - name: Apply vendor config
        working-directory: common
        run: |
          scripts/kconfig/merge_config.sh -m -O out \
            out/.config \
            "$GITHUB_WORKSPACE/vendor_exynosnext.config" 2>&1
          make O=out \
            ARCH=arm64 SUBARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            -j$(nproc --all) \
            olddefconfig 2>&1
          echo "=== vendor config applied ==="
          grep -c "=y" out/.config || true
          grep -c "=m" out/.config || true

      - name: Build kernel image
        working-directory: common
        run: |
          make O=out \
            ARCH=arm64 SUBARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            -j$(nproc --all) \
            Image 2>&1

      - name: Build modules
        working-directory: common
        run: |
          make O=out \
            ARCH=arm64 SUBARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            -j$(nproc --all) \
            modules 2>&1

      - name: Build DTBs
        working-directory: common
        run: |
          make O=out \
            ARCH=arm64 SUBARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            -j$(nproc --all) \
            dtbs 2>&1

      - name: Install modules
        working-directory: common
        run: |
          mkdir -p "$GITHUB_WORKSPACE/out/dist/lib/modules"
          make O=out \
            ARCH=arm64 SUBARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            -j$(nproc --all) \
            modules_install INSTALL_MOD_PATH="$GITHUB_WORKSPACE/out/dist" 2>&1

      - name: Package outputs
        run: |
          mkdir -p out/dist
          cp common/out/arch/arm64/boot/Image out/dist/ 2>/dev/null || echo "WARNING: Image not found"
          cp -r common/out/arch/arm64/boot/dts out/dist/ 2>/dev/null || echo "WARNING: dtbs not found"
          ls -lh out/dist/
          ls -lh out/dist/Image 2>/dev/null || true
          find out/dist/lib/modules -name '*.ko' 2>/dev/null | wc -l || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.variant }}
          path: |
            common/out/log/
            common/out/.config
          retention-days: 7

      - name: Create release zip
        if: success()
        run: |
          VERSION=$(date +%Y%m%d-%H%M)
          ZIP_NAME="ExynosNext-${{ matrix.zip_suffix }}-${VERSION}.zip"
          cd out/dist
          zip -r9 "../../${ZIP_NAME}" * -x '*.git*'

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ExynosNext-${{ matrix.zip_suffix }}
          path: '*.zip'
          retention-days: 14

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
