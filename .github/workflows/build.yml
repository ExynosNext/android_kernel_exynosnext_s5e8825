name: ExynosNext Kernel CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ksu
          - vanilla
          - suksu
      clean_build:
        description: 'Clean build'
        required: false
        default: false
        type: boolean

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 50G

jobs:
  build:
    name: Build ExynosNext (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        variant: [ksu, vanilla]
        include:
          - variant: ksu
            config_flag: '--ksu'
            zip_suffix: 'KSU'
          - variant: vanilla
            config_flag: '--vanilla'
            zip_suffix: 'Vanilla'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo docker image prune --all --force || true

      - name: Setup environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential ccache curl flex git \
            libncurses5-dev libssl-dev python3 python3-pip \
            lz4 zip unzip tar xz-utils cpio \
            clang lld llvm llvm-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Setup Bazelisk
        run: |
          curl -fsSL -o /tmp/bazelisk \
            https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-amd64
          sudo install -m 755 /tmp/bazelisk /usr/local/bin/bazel
          bazel --version

      - name: Setup repo
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Prepare for repo sync
        run: |
          mv MODULE.bazel MODULE.bazel.bak 2>/dev/null || true
          mv BUILD.bazel BUILD.bazel.bak 2>/dev/null || true
          mv .bazelrc .bazelrc.bak 2>/dev/null || true

      - name: Init repo
        run: |
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-android17-6.18 --depth=1
          repo sync -j$(nproc --all) --no-tags

      - name: Restore overlay files
        run: |
          mv MODULE.bazel.bak MODULE.bazel 2>/dev/null || true
          mv BUILD.bazel.bak BUILD.bazel 2>/dev/null || true
          mv .bazelrc.bak .bazelrc 2>/dev/null || true

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ matrix.variant }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.variant }}-
            ccache-${{ runner.os }}-

      - name: Build kernel
        run: |
          chmod +x scripts/build.sh
          set +e
          ./scripts/build.sh --${{ matrix.variant }} --jobs=$(nproc --all) 2>&1 | tee /tmp/build-output.log
          BUILD_RC=${PIPESTATUS[0]}
          set -e
          if [ "$BUILD_RC" -ne 0 ]; then
            echo "::error::Build failed with exit code $BUILD_RC"
            echo "--- Last 100 lines of build log ---"
            tail -100 /tmp/build-output.log
            echo "--- End of log ---"
            exit "$BUILD_RC"
          fi

      - name: Dump build log on failure
        if: failure()
        run: |
          echo "=== Full build log tail ==="
          tail -200 /tmp/build-output.log 2>/dev/null || true
          echo "=== common/ contents ==="
          ls -la common/ 2>/dev/null | head -30 || echo "common/ does not exist"
          echo "=== out/ contents ==="
          ls -la common/out/ 2>/dev/null | head -20 || echo "common/out/ does not exist"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.variant }}
          path: /tmp/build-output.log
          retention-days: 7

      - name: Create release zip
        if: success()
        run: |
          VERSION=$(date +%Y%m%d-%H%M)
          ZIP_NAME="ExynosNext-${{ matrix.zip_suffix }}-${VERSION}.zip"
          cd out/dist
          zip -r9 "../../${ZIP_NAME}" * -x '*.git*'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ExynosNext-${{ matrix.zip_suffix }}
          path: '*.zip'
          retention-days: 14

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
