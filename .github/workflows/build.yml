name: ExynosNext Kernel CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ksu
          - vanilla
      clean_build:
        description: 'Clean build'
        required: false
        default: false
        type: boolean

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 50G

jobs:
  build:
    name: Build ExynosNext (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        variant: [ksu, vanilla]
        include:
          - variant: ksu
            zip_suffix: 'KSU'
          - variant: vanilla
            zip_suffix: 'Vanilla'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo docker image prune --all --force || true

      - name: Setup environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential ccache curl flex git \
            libncurses5-dev libssl-dev python3 python3-pip \
            lz4 zip unzip tar xz-utils cpio \
            clang lld llvm llvm-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Setup repo
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init and sync kernel source
        run: |
          mv MODULE.bazel MODULE.bazel.bak 2>/dev/null || true
          mv BUILD.bazel BUILD.bazel.bak 2>/dev/null || true
          mv .bazelrc .bazelrc.bak 2>/dev/null || true
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-android17-6.18 --depth=1
          repo sync -j$(nproc --all) --no-tags
          mv MODULE.bazel.bak MODULE.bazel 2>/dev/null || true
          mv BUILD.bazel.bak BUILD.bazel 2>/dev/null || true
          mv .bazelrc.bak .bazelrc 2>/dev/null || true

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ matrix.variant }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.variant }}-
            ccache-${{ runner.os }}-

      - name: Verify toolchain
        run: |
          echo "=== Compiler ==="
          clang --version
          echo "=== Linker ==="
          ld.lld --version
          echo "=== Cross compiler ==="
          aarch64-linux-gnu-gcc --version | head -1
          echo "=== Kernel source ==="
          ls common/Makefile common/arch/arm64/configs/gki_defconfig 2>/dev/null || echo "ERROR: kernel source not found"
          echo "=== merge_config.sh ==="
          ls common/scripts/kconfig/merge_config.sh 2>/dev/null || echo "ERROR: merge_config.sh not found"
          echo "=== Disk space ==="
          df -h .

      - name: Build kernel
        working-directory: common
        id: build
        run: |
          LOG="$GITHUB_WORKSPACE/build-output.log"
          {
            echo "=== Defconfig ==="
            make O=out \
              ARCH=arm64 SUBARCH=arm64 \
              LLVM=1 LLVM_IAS=1 \
              CC=clang LD=ld.lld \
              -j$(nproc --all) \
              gki_defconfig 2>&1

            echo ""
            echo "=== .config exists? ==="
            ls -la out/.config 2>&1 || echo "ERROR: .config not created"

            echo ""
            echo "=== Apply vendor config ==="
            if [ -f "$GITHUB_WORKSPACE/vendor_exynosnext.config" ]; then
              scripts/kconfig/merge_config.sh -m -O out \
                out/.config \
                "$GITHUB_WORKSPACE/vendor_exynosnext.config" 2>&1 || echo "WARN: merge_config returned non-zero"
              make O=out \
                ARCH=arm64 SUBARCH=arm64 \
                LLVM=1 LLVM_IAS=1 \
                CC=clang LD=ld.lld \
                olddefconfig 2>&1
              echo "=== Config stats ==="
              echo "y options: $(grep -c '=y' out/.config 2>/dev/null || echo 0)"
              echo "m options: $(grep -c '=m' out/.config 2>/dev/null || echo 0)"
            else
              echo "WARN: No vendor config found"
            fi

            echo ""
            echo "=== Build Image ==="
            make O=out \
              ARCH=arm64 SUBARCH=arm64 \
              LLVM=1 LLVM_IAS=1 \
              CC=clang LD=ld.lld \
              AR=llvm-ar NM=llvm-nm \
              OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
              -j$(nproc --all) \
              V=1 Image 2>&1

            echo ""
            echo "=== Build modules ==="
            make O=out \
              ARCH=arm64 SUBARCH=arm64 \
              LLVM=1 LLVM_IAS=1 \
              CC=clang LD=ld.lld \
              AR=llvm-ar NM=llvm-nm \
              OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
              -j$(nproc --all) \
              modules 2>&1

            echo ""
            echo "=== Build DTBs ==="
            make O=out \
              ARCH=arm64 SUBARCH=arm64 \
              LLVM=1 LLVM_IAS=1 \
              CC=clang LD=ld.lld \
              AR=llvm-ar NM=llvm-nm \
              OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
              -j$(nproc --all) \
              dtbs 2>&1

            echo ""
            echo "=== Install modules ==="
            mkdir -p "$GITHUB_WORKSPACE/out/dist/lib/modules"
            make O=out \
              ARCH=arm64 SUBARCH=arm64 \
              LLVM=1 LLVM_IAS=1 \
              CC=clang LD=ld.lld \
              AR=llvm-ar NM=llvm-nm \
              OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
              -j$(nproc --all) \
              modules_install INSTALL_MOD_PATH="$GITHUB_WORKSPACE/out/dist" 2>&1

            echo ""
            echo "=== Outputs ==="
            ls -lh out/arch/arm64/boot/Image 2>&1 || echo "No Image"
            find out/lib/modules -name '*.ko' 2>/dev/null | wc -l || true
          } 2>&1 | tee "$LOG"
          echo "log_path=$LOG" >> "$GITHUB_OUTPUT"

      - name: Package outputs
        if: always()
        run: |
          mkdir -p out/dist
          cp common/out/arch/arm64/boot/Image out/dist/ 2>/dev/null || echo "WARNING: Image not found"
          ls -lh out/dist/ 2>/dev/null || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.variant }}
          path: build-output.log
          retention-days: 7

      - name: Upload .config
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-config-${{ matrix.variant }}
          path: common/out/.config
          retention-days: 7

      - name: Create release zip
        if: success()
        run: |
          VERSION=$(date +%Y%m%d-%H%M)
          ZIP_NAME="ExynosNext-${{ matrix.zip_suffix }}-${VERSION}.zip"
          cd out/dist
          zip -r9 "../../${ZIP_NAME}" * -x '*.git*'

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ExynosNext-${{ matrix.zip_suffix }}
          path: '*.zip'
          retention-days: 14

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
